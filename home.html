<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind and Daisy UI integration-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../styles/style.css">

    <!-- Google font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-100">
    <header class="">
        <div class="navbar flex justify-between bg-base-100 shadow-sm">
            <div class="flex items-center w-9 h-9">
                <img src="/assets/github-logo.png" alt="github logo">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button id="searchBtn" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i>Search</button>
            </div>
        </div>
    </header>


    <main class="">

        <!-- Active Buttons -->
        <div id="buttons" class="bg-white w-10/12 mx-auto p-4 rounded-md mt-6 shadow-md">
            <button onclick="loadIssues('all')" id="btnAll" class="btn button active">All</button>
            <button onclick="loadIssues('open')" id="btnOpen" class="btn button">Open</button>
            <button onclick="loadIssues('closed')" id="btnClosed" class="btn button">Closed</button>
        </div>

        <!-- Issues section -->
        <section class="bg-white w-10/12 mx-auto p-4 rounded-md mt-6 shadow-md">

            <div class="flex flex-col gap-6 md:flex-row justify-between items-center">
                <div class="flex justify-between items-center gap-2">
                    <img src="/assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-semibold"><span id="totalIssues">0</span> Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 ">
                    <div>
                        <p><i class="fa-solid fa-circle-dot text-green-500"></i>Open</p>
                    </div>
                    <div>
                        <p><i class="fa-solid fa-circle-dot text-purple-500"></i>Close</p>
                    </div>
                </div>
            </div>

            <div class="">
                <div id="issueContainer" class="p-5 grid md:grid-cols-4 sm:grid-cols-1 gap-1"></div>
                <div class="flex justify-center items-center hidden" id="loading">
                    <span class="loading loading-dots loading-xl"></span>
                </div>
                <dialog id="issueModal" class="modal modal-bottom sm:modal-middle">
                </dialog>
            </div>

        </section>

    </main>


    <footer></footer>
    <script src="/JS files/home.js"></script>
</body>

</html>
